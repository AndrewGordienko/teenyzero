<!DOCTYPE html>
<html>
<head>
    <title>teenyzero | play</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.css">
    <style>
        body {
            background: #ffffff;
            color: #312e2b;
            font-family: "Avenir Next", "Segoe UI", sans-serif;
            margin: 0;
        }
        .shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: 28px 24px 48px;
        }
        .topbar {
            display: flex;
            justify-content: space-between;
            align-items: end;
            gap: 20px;
            padding-bottom: 24px;
            margin-bottom: 24px;
            border-bottom: 1px solid #e3e8ed;
        }
        .eyebrow {
            margin-bottom: 8px;
            color: #1f56d8;
            text-transform: uppercase;
            letter-spacing: 0.16em;
            font-size: 12px;
        }
        h1 {
            margin: 0 0 8px;
            font-size: 34px;
            letter-spacing: -0.04em;
        }
        .subtitle {
            margin: 0;
            color: #697683;
            font-size: 14px;
        }
        .home-link {
            color: #12171d;
            text-decoration: none;
            border: 1px solid #e3e8ed;
            border-radius: 999px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 600;
        }
        .container { display: flex; gap: 36px; align-items: flex-start; }
        #board {
            width: 480px;
            filter: drop-shadow(0 8px 24px rgba(0,0,0,0.10));
        }
        .info {
            width: 300px;
            background: #fff;
            padding: 22px;
            border-radius: 18px;
            border: 1px solid #e3e8ed;
        }
        h3 {
            color: #1a1a1a;
            margin-top: 0;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1.4px;
            padding-bottom: 12px;
            margin-bottom: 18px;
            border-bottom: 1px solid #e3e8ed;
        }
        .stat { margin: 16px 0; font-size: 13px; color: #666; overflow: hidden; }
        .val { color: #1a1a1a; font-weight: 700; float: right; }
        select, button {
            width: 100%;
            padding: 12px;
            margin-top: 8px;
            border-radius: 10px;
            border: 1px solid #d8e0e7;
            font-size: 13px;
            background: white;
            outline: none;
        }
        button {
            background: #1f56d8;
            color: white;
            font-weight: 600;
            border: none;
            margin-top: 22px;
        }
        .label-small {
            font-size: 10px;
            font-weight: 700;
            color: #8a96a3;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .section-spacer { margin-top: 28px; }
        @media (max-width: 900px) {
            .topbar, .container {
                flex-direction: column;
                align-items: start;
            }
            #board, .info {
                width: 100%;
                max-width: 480px;
            }
        }
    </style>
</head>
<body>
<main class="shell">
    <div class="topbar">
        <div>
            <div class="eyebrow">TeenyZero</div>
            <h1>Play Current Network</h1>
            <p class="subtitle">Interactive engine board backed by the current model.</p>
        </div>
        <a class="home-link" href="/">Back to Hub</a>
    </div>

    <div class="container">
        <div id="board"></div>
        <div class="info">
            <h3>Engine Play</h3>
            <div class="label-small">Environment Setup</div>
            <select id="user-side" onchange="resetGame()">
                <option value="w">Play as White</option>
                <option value="b">Play as Black</option>
            </select>

            <div class="label-small section-spacer">MCTS Inference Metrics</div>
            <div class="stat">Win Probability <span id="win-prob" class="val">50.0%</span></div>
            <div class="stat">System Status <span id="status" class="val">Ready</span></div>

            <button onclick="resetGame()">Reset Environment</button>
        </div>
    </div>
</main>

<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chessboard-js/1.0.0/chessboard-1.0.0.min.js"></script>
<script>
    let board = null;
    let game = new Chess();
    let playerSide = "w";

    function syncGame(fen) {
        game.load(fen);
        board.position(fen, false);
    }

    function onDragStart(source, piece) {
        const pieceSide = piece[0].toLowerCase();
        if (game.game_over()) return false;
        if (pieceSide !== playerSide) return false;
        if ((game.turn() === "w" && playerSide !== "w") || (game.turn() === "b" && playerSide !== "b")) return false;
        return true;
    }

    function onDrop(source, target) {
        if (source === target) return "snapback";

        const move = game.move({
            from: source,
            to: target,
            promotion: "q"
        });

        if (move === null) {
            return "snapback";
        }

        $("#status").text("Computing...");

        $.ajax({
            url: "/move",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ uci: move.from + move.to + (move.promotion || "") }),
            success: function(data) {
                if (data.fen) {
                    syncGame(data.fen);
                }
                if (data.win_prob !== undefined) {
                    $("#win-prob").text(Number(data.win_prob).toFixed(1) + "%");
                }
                $("#status").text(game.turn() === playerSide ? "Your Move" : "Engine Move");
            },
            error: function(err) {
                console.error("Move Error:", err);
                game.undo();
                board.position(game.fen(), false);
                $("#status").text("Illegal Move");
            }
        });
    }

    function resetGame() {
        playerSide = $("#user-side").val();
        $("#status").text("Resetting...");

        $.ajax({
            url: "/reset",
            type: "POST",
            contentType: "application/json",
            data: JSON.stringify({ side: playerSide }),
            success: function(data) {
                board.orientation(playerSide === "w" ? "white" : "black");
                syncGame(data.fen);
                $("#win-prob").text(Number(data.win_prob || 50.0).toFixed(1) + "%");
                $("#status").text(game.turn() === playerSide ? "Your Move" : "Engine Move");
            },
            error: function(err) {
                console.error("Reset Error:", err);
                $("#status").text("Reset Failed");
            }
        });
    }

    board = Chessboard("board", {
        draggable: true,
        position: "start",
        onDragStart: onDragStart,
        onDrop: onDrop,
        pieceTheme: "/static/pieces/{piece}.png"
    });

    resetGame();
</script>
</body>
</html>
